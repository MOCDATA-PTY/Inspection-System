
<!DOCTYPE html>
<html>
<head>
    <title>RFI Test</title>
    <style>
        .btn { padding: 8px 16px; border: none; border-radius: 4px; margin: 5px; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-success { background-color: #28a745; color: white; }
    </style>
</head>
<body>
    <h1>RFI Button Test</h1>
    <p>Rule: GREEN if file exists, GREY if no file</p>
    
    <h3>Test Cases:</h3>
    <button id="rfi-has-file" class="btn btn-success">RFI ✓</button>
    <button id="rfi-no-file" class="btn btn-secondary">RFI</button>
    <button id="rfi-dynamic" class="btn btn-secondary">RFI</button>
    <button onclick="toggle()">Toggle</button>
    
    <script>
        let hasFile = false;
        function toggle() {
            const btn = document.getElementById('rfi-dynamic');
            hasFile = !hasFile;
            if (hasFile) {
                btn.className = 'btn btn-success';
                btn.innerHTML = 'RFI ✓';
            } else {
                btn.className = 'btn btn-secondary';
                btn.innerHTML = 'RFI';
            }
        }
    </script>
</body>
</html>
