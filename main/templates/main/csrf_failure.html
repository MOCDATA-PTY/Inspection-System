<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Food Safety Agency</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .error-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .error-icon {
            font-size: 4rem;
            color: #f59e0b;
            margin-bottom: 1.5rem;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .suggestions {
            text-align: left;
            margin-bottom: 2rem;
        }

        .suggestions h3 {
            font-size: 1.2rem;
            color: #1f2937;
            margin-bottom: 1rem;
            text-align: center;
        }

        .suggestions ul {
            list-style: none;
            padding: 0;
        }

        .suggestions li {
            padding: 0.75rem 0;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            color: #4b5563;
        }

        .suggestions li:last-child {
            border-bottom: none;
        }

        .suggestions li i {
            color: #10b981;
            margin-right: 0.75rem;
            width: 20px;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #007890;
            color: white;
        }

        .btn-primary:hover {
            background: #005a6b;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .technical-details {
            margin-top: 2rem;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #6b7280;
        }

        @media (max-width: 768px) {
            .error-container {
                padding: 2rem;
                margin: 1rem;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <i class="fas fa-shield-alt error-icon"></i>
        
        <h1 class="error-title">{{ title }}</h1>
        
        <p class="error-message">{{ message }}</p>
        
        <div class="suggestions">
            <h3>How to fix this:</h3>
            <ul>
                {% for suggestion in suggestions %}
                <li>
                    <i class="fas fa-check"></i>
                    {{ suggestion }}
                </li>
                {% endfor %}
            </ul>
        </div>
        
        <div class="action-buttons">
            <button onclick="window.location.reload()" class="btn btn-primary">
                <i class="fas fa-redo"></i>
                Refresh Page
            </button>
            
            <a href="{% url 'login' %}" class="btn btn-secondary">
                <i class="fas fa-sign-in-alt"></i>
                Login Again
            </a>
        </div>
        
        {% if reason %}
        <div class="technical-details">
            <strong>Technical details:</strong> {{ reason }}
        </div>
        {% endif %}
    </div>

    <script>
        // Auto-refresh after 10 seconds
        setTimeout(function() {
            if (confirm('Would you like to refresh the page automatically?')) {
                window.location.reload();
            }
        }, 10000);

        // Clear any problematic data
        try {
            // Clear session storage
            sessionStorage.clear();
            
            // Clear any cached form data
            const forms = document.querySelectorAll('form');
            forms.forEach(form => form.reset());
        } catch (e) {
            console.log('Could not clear storage:', e);
        }
    </script>
</body>
</html>
